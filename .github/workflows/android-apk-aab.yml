name: Build VS Hook Android APK AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name, exemplo: 1.8.1'
        required: true
        default: '1.8.1'
      version_code:
        description: 'Version code inteiro, aumente a cada envio para Play Store'
        required: true
        default: '18'
  push:
    tags:
      - 'android-v*'
      - 'mobile-v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add/sync Android
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android
          cp -R android-icons/* android/app/src/main/res/ || true

      - name: Set Android version
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name || '1.8.1' }}"
          VERSION_CODE="${{ github.event.inputs.version_code || '18' }}"
          python3 scripts/set-android-version.py --version-name "$VERSION_NAME" --version-code "$VERSION_CODE"

      - name: Configure Android signing
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/vshook-upload-key.jks
          cat > android/keystore.properties <<EOF
          storeFile=vshook-upload-key.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          python3 scripts/configure-android-signing.py

      - name: Build APK and AAB
        run: |
          cd android
          chmod +x ./gradlew
          if [ -f keystore.properties ]; then
            ./gradlew assembleRelease bundleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VS-Hook-Android-APK-AAB
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/bundle/**/*.aab
