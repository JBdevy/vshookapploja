name: VS Hook Mobile - Android

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name, exemplo: 1.8.1'
        required: true
        default: '1.8.1'
      version_code:
        description: 'Version code inteiro, aumente a cada envio para Play Store'
        required: true
        default: '18'
  push:
    tags:
      - 'android-v*'
      - 'mobile-v*'

jobs:
  android-apk-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Preparar app web
        run: npm run build

      - name: Sincronizar Android
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android
          python3 scripts/apply-native-icons.py android

      - name: Definir versão Android
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name || '1.8.1' }}"
          VERSION_CODE="${{ github.event.inputs.version_code || '18' }}"
          python3 scripts/set-android-version.py --version-name "$VERSION_NAME" --version-code "$VERSION_CODE"

      - name: Preparar assinatura Android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 vazio; será gerado APK debug."
            echo "ANDROID_SIGNED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Faltam KEYSTORE_PASSWORD, KEY_ALIAS ou KEY_PASSWORD."
            exit 1
          fi

          mkdir -p android/app
          ORIGINAL_KEYSTORE="android/app/vshook-upload-key-original.keystore"
          FINAL_KEYSTORE="android/app/vshook-upload-key.p12"

          python3 - <<'PY'
          import base64, os, re, sys
          raw = os.environ.get('KEYSTORE_BASE64', '')
          raw = re.sub(r'\s+', '', raw)
          raw = ''.join(ch for ch in raw if ch.isalnum() or ch in '+/=')
          raw += '=' * (-len(raw) % 4)
          try:
              data = base64.b64decode(raw, validate=False)
          except Exception as exc:
              print('KEYSTORE_BASE64 inválido. Gere novamente o Base64 do arquivo .keystore/.jks.')
              print(exc)
              sys.exit(1)
          if len(data) < 1000:
              print(f'Keystore decodificada pequena demais ({len(data)} bytes). Secret incorreto.')
              sys.exit(1)
          open('android/app/vshook-upload-key-original.keystore', 'wb').write(data)
          print(f'Keystore Android decodificada: {len(data)} bytes')
          PY

          DETECTED_TYPE=""
          for T in JKS PKCS12; do
            if keytool -list -keystore "$ORIGINAL_KEYSTORE" -storetype "$T" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
              DETECTED_TYPE="$T"
              break
            fi
          done

          if [ -z "$DETECTED_TYPE" ]; then
            echo "Não consegui abrir a keystore com KEYSTORE_PASSWORD/KEY_ALIAS. Confira KEYSTORE_PASSWORD e KEY_ALIAS."
            exit 1
          fi

          echo "Keystore Android detectada: $DETECTED_TYPE"

          try_import() {
            SRC_KEY_PASS="$1"
            rm -f "$FINAL_KEYSTORE"
            keytool -importkeystore -noprompt               -srckeystore "$ORIGINAL_KEYSTORE"               -srcstoretype "$DETECTED_TYPE"               -srcstorepass "$KEYSTORE_PASSWORD"               -srcalias "$KEY_ALIAS"               -srckeypass "$SRC_KEY_PASS"               -destkeystore "$FINAL_KEYSTORE"               -deststoretype PKCS12               -deststorepass "$KEYSTORE_PASSWORD"               -destkeypass "$KEYSTORE_PASSWORD"               -destalias "$KEY_ALIAS" >/dev/null 2>&1
          }

          if try_import "$KEY_PASSWORD"; then
            echo "Keystore convertida para PKCS12 usando KEY_PASSWORD."
          elif [ "$KEY_PASSWORD" != "$KEYSTORE_PASSWORD" ] && try_import "$KEYSTORE_PASSWORD"; then
            echo "Keystore convertida para PKCS12 usando KEYSTORE_PASSWORD como senha da chave."
          else
            echo "KEY_PASSWORD incorreto para o alias informado. Atualize o secret KEY_PASSWORD."
            exit 1
          fi

          echo "ANDROID_SIGNED=1" >> "$GITHUB_ENV"
          echo "ANDROID_STORE_FILE=$GITHUB_WORKSPACE/$FINAL_KEYSTORE" >> "$GITHUB_ENV"
          {
            echo "ANDROID_KEY_PASSWORD_EFFECTIVE<<EOF"
            echo "$KEYSTORE_PASSWORD"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Gerar APK e AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd android
          chmod +x ./gradlew
          if [ "$ANDROID_SIGNED" = "1" ]; then
            ./gradlew assembleRelease bundleRelease               -Pandroid.injected.signing.store.file="$ANDROID_STORE_FILE"               -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD"               -Pandroid.injected.signing.key.alias="$KEY_ALIAS"               -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD_EFFECTIVE"               -Pandroid.injected.signing.store.type=pkcs12
          else
            ./gradlew assembleDebug
          fi
      - name: Enviar APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: VS-Hook-Android
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/bundle/**/*.aab
