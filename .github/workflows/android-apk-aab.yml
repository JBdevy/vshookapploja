name: VS Hook Mobile - Android

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name, exemplo: 1.8.1'
        required: true
        default: '1.8.1'
      version_code:
        description: 'Version code inteiro, aumente a cada envio para Play Store'
        required: true
        default: '18'
  push:
    tags:
      - 'android-v*'
      - 'mobile-v*'

jobs:
  android-apk-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Preparar app web
        run: npm run build

      - name: Sincronizar Android
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android
          cp -R android-icons/* android/app/src/main/res/ || true

      - name: Definir versão Android
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name || '1.8.1' }}"
          VERSION_CODE="${{ github.event.inputs.version_code || '18' }}"
          python3 scripts/set-android-version.py --version-name "$VERSION_NAME" --version-code "$VERSION_CODE"

      - name: Preparar assinatura Android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 vazio; será gerado APK debug."
            echo "ANDROID_SIGNED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Faltam KEYSTORE_PASSWORD, KEY_ALIAS ou KEY_PASSWORD."
            exit 1
          fi
          mkdir -p android/app
          python3 - <<'PY'
          import base64, os, re, sys
          raw = os.environ.get('KEYSTORE_BASE64', '')
          raw = re.sub(r'\s+', '', raw)
          raw = ''.join(ch for ch in raw if ch.isalnum() or ch in '+/=')
          raw += '=' * (-len(raw) % 4)
          try:
              data = base64.b64decode(raw, validate=False)
          except Exception as exc:
              print('KEYSTORE_BASE64 inválido. Gere novamente o Base64 do arquivo .keystore/.jks.')
              print(exc)
              sys.exit(1)
          if len(data) < 1000:
              print(f'Keystore decodificada pequena demais ({len(data)} bytes). Secret incorreto.')
              sys.exit(1)
          open('android/app/vshook-upload-key.jks', 'wb').write(data)
          print(f'Keystore Android decodificada: {len(data)} bytes')
          PY
          echo "ANDROID_SIGNED=1" >> "$GITHUB_ENV"

      - name: Gerar APK e AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          if [ "$ANDROID_SIGNED" = "1" ]; then
            STORE_FILE="$PWD/app/vshook-upload-key.jks"
            ./gradlew assembleRelease bundleRelease \
              -Pandroid.injected.signing.store.file="$STORE_FILE" \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew assembleDebug
          fi

      - name: Enviar APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: VS-Hook-Android
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/bundle/**/*.aab
